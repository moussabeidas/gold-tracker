name: EAS iOS Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-submit:
    name: Build & Submit to App Store
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set up code signing keychain
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASS="build_keychain_pass_2026"

          # Create fresh temporary keychain
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"

          # Add to the search list (prepend our keychain to existing ones)
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')

          # Download and import Apple WWDR G4 (intermediate CA for distribution certs since 2021)
          curl -sL https://developer.apple.com/certificationauthority/AppleWWDRCAG4.cer -o /tmp/AppleWWDRCAG4.cer
          security import /tmp/AppleWWDRCAG4.cer -k "$KEYCHAIN_NAME" -A -T /usr/bin/codesign 2>/dev/null || true

          # Also import WWDR G3 for compatibility
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/AppleWWDRCAG3.cer
          security import /tmp/AppleWWDRCAG3.cer -k "$KEYCHAIN_NAME" -A -T /usr/bin/codesign 2>/dev/null || true

          # Import our distribution p12 (contains private key + certificate)
          security import store-assets/distribution.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "GoldTrack2027Secure" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to use the keychain without user prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"

          # Verify import succeeded
          echo "Installed certificates:"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME" || security find-identity -v "$KEYCHAIN_NAME"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp store-assets/Gold_Tracker_Production.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> $GITHUB_ENV

      - name: Build iOS app (local build on macOS runner)
        run: eas build --platform ios --profile production --non-interactive --local --output ./gold-tracker.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-tracker-ios
          path: ./gold-tracker.ipa
          retention-days: 7

      - name: Submit to App Store
        run: eas submit --platform ios --profile production --path ./gold-tracker.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
