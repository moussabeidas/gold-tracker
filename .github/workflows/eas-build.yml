name: EAS iOS Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-submit:
    name: Build & Submit to App Store
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set up code signing
        env:
          P12_PASSWORD: GoldTrack2027Secure
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="runner_keychain_pass"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download Apple WWDR G4 (needed for trust chain of Apple Distribution certs)
          curl -sL "https://developer.apple.com/certificationauthority/AppleWWDRCAG4.cer" -o "$RUNNER_TEMP/WWDR_G4.cer"
          security import "$RUNNER_TEMP/WWDR_G4.cer" -k "$KEYCHAIN_PATH" -A -T /usr/bin/codesign 2>/dev/null || true

          # Also trust WWDR G3 just in case
          curl -sL "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" -o "$RUNNER_TEMP/WWDR_G3.cer"
          security import "$RUNNER_TEMP/WWDR_G3.cer" -k "$KEYCHAIN_PATH" -A -T /usr/bin/codesign 2>/dev/null || true

          # Import distribution certificate (p12 with private key)
          security import store-assets/distribution.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the search list so it's checked first
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

          # Install provisioning profile (must use UUID as filename for Xcode to find it)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp store-assets/Gold_Tracker_Production.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/0583bd09-06ea-497f-bcbe-16caf294016d.mobileprovision
          echo "Installed provisioning profile:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Discover Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -z "$WORKSPACE" ]; then
            echo "Error: Could not find xcworkspace after pod install"
            ls -la ios/
            exit 1
          fi
          # Derive scheme from workspace name (they match for the main app)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          # Verify the scheme exists in the xcodeproj (not from Pods)
          PROJ=$(find ios -name "*.xcodeproj" -maxdepth 1 2>/dev/null | head -1)
          if [ -n "$PROJ" ]; then
            PROJ_SCHEME=$(find "$PROJ" -name "*.xcscheme" -path "*/xcshareddata/*" 2>/dev/null | head -1 | xargs basename 2>/dev/null | sed 's/\.xcscheme//')
            if [ -n "$PROJ_SCHEME" ]; then
              SCHEME="$PROJ_SCHEME"
            fi
          fi
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          echo "Project: $PROJ"

      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>P2TSL4VJ5H</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.mbeidas.goldtracker</key>
              <string>Gold Tracker Production</string>
            </dict>
          </dict>
          </plist>
          PLIST_EOF

      - name: Archive iOS app with xcodebuild
        run: |
          set -o pipefail
          ARCHIVE_LOG="$RUNNER_TEMP/xcodebuild_archive.log"
          xcodebuild archive \
            -workspace "ios/${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/GoldTracker.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Gold Tracker Production" \
            DEVELOPMENT_TEAM=P2TSL4VJ5H \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee "$ARCHIVE_LOG" | grep -E "error:|CodeSign|signing|provisioning|ARCHIVE (FAIL|SUCC)|BUILD (FAIL|SUCC)|warning.*CODE_SIGN|warning.*provision" || true
          XCODE_EXIT=${PIPESTATUS[0]}
          if [ "$XCODE_EXIT" -ne 0 ]; then
            echo "=== LAST 30 LINES OF ARCHIVE LOG ==="
            tail -30 "$ARCHIVE_LOG"
            exit "$XCODE_EXIT"
          fi
          ls -la "$RUNNER_TEMP/" | grep xcarchive

      - name: Export IPA from archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/GoldTracker.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      - name: Copy IPA to workspace
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: IPA not found in $RUNNER_TEMP/ipa"
            ls -la "$RUNNER_TEMP/ipa/" || true
            exit 1
          fi
          cp "$IPA_PATH" ./gold-tracker.ipa
          echo "IPA ready: $IPA_PATH ($(stat -f%z ./gold-tracker.ipa) bytes)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-tracker-ios
          path: ./gold-tracker.ipa
          retention-days: 30

      - name: Submit to App Store
        run: eas submit --platform ios --profile production --path ./gold-tracker.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
