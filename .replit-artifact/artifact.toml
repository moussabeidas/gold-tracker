kind = "mobile"
previewPath = "/"
title = "Gold Tracker"
version = "1.0.0"
id = "artifacts/gold-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 18586
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gold-tracker run dev"

[services.env]
PORT = "18586"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gold-tracker", "run", "build"]
run = ["pnpm", "--filter", "@workspace/gold-tracker", "run", "serve"]
